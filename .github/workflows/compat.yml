name: Compat (Crawl4AI latest)

# Autonomy watchdog: weekly (and on demand) it installs the newest Crawl4AI and
# our newest proxyhat SDK, then runs the test suite against them — this time with
# the REAL Crawl4AI ProxyConfig / ProxyRotationStrategy (not the fallback shim).
# A red run means upstream shipped a breaking change; it opens/updates a tracking
# issue so we notice before users do. The proactive path is Renovate
# (renovate.json), which opens a version-bump PR that must pass CI before merge.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Install latest upstreams
        run: pip install --upgrade crawl4ai proxyhat
      - name: Verify the real Crawl4AI classes are in use
        run: python -c "import crawl4ai_proxyhat as m; assert m.CRAWL4AI_AVAILABLE, 'crawl4ai not importable'"
      - run: pytest -v
      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Compat break: crawl4ai@latest / proxyhat@latest";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "compat",
            });
            const body = `The weekly compatibility check failed against the latest upstream releases.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["compat"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues[0].number, body,
              });
            }
